name: Bug report
description: Report a defect or regression
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please provide enough detail to reproduce and triage quickly."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and diagnostics
      description: Remove secrets and sensitive information before submitting.
